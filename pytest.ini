[pytest]
markers =
    unit: no external dependencies; always safe to run
    integration: requires a running PostgreSQL instance
    e2e: full end-to-end pipeline; requires PostgreSQL
    regression: pinned tests for previously found bug classes
    security: static security and credential pattern scans
    snapshot: golden-file output comparison tests
    parity: cross-environment row-count consistency tests

addopts = -ra -q
testpaths = backend/migration/tests backend/tests
